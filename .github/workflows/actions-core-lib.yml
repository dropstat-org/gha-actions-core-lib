name: ActionsCoreLib

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
  pull_request:
  workflow_dispatch:
  workflow_call: # secrets are inherited automatically when caller uses `secrets: inherit`

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    outputs:
      compile_enabled:     ${{ steps.ActionsCoreLib.outputs.compile_enabled }}
      unit_test_enabled:   ${{ steps.ActionsCoreLib.outputs.unit_test_enabled }}
      linter_enabled:      ${{ steps.ActionsCoreLib.outputs.linter_enabled }}
      semgrep_enabled:     ${{ steps.ActionsCoreLib.outputs.semgrep_enabled }}
      sonarqube_enabled:   ${{ steps.ActionsCoreLib.outputs.sonarqube_enabled }}
      trivy_enabled:       ${{ steps.ActionsCoreLib.outputs.trivy_enabled }}
      checkov_enabled:     ${{ steps.ActionsCoreLib.outputs.checkov_enabled }}
      checkov_tf_enabled:  ${{ steps.ActionsCoreLib.outputs.checkov_tf_enabled }}
      plan_enabled:        ${{ steps.ActionsCoreLib.outputs.plan_enabled }}
      publish_enabled:     ${{ steps.ActionsCoreLib.outputs.publish_enabled }}
      release_enabled:     ${{ steps.ActionsCoreLib.outputs.release_enabled }}
      deploy_enabled:      ${{ steps.ActionsCoreLib.outputs.deploy_enabled }}
      pre_deploy_enabled:  ${{ steps.ActionsCoreLib.outputs.pre_deploy_enabled }}
      post_deploy_enabled: ${{ steps.ActionsCoreLib.outputs.post_deploy_enabled }}
      generic_enabled:     ${{ steps.ActionsCoreLib.outputs.generic_enabled }}
      deploy_environment:  ${{ steps.ActionsCoreLib.outputs.deploy_environment }}
      tools_terraform:     ${{ steps.ActionsCoreLib.outputs.tools_terraform }}
      tools_terragrunt:    ${{ steps.ActionsCoreLib.outputs.tools_terragrunt }}
      ActionsCoreLib_type: ${{ steps.ActionsCoreLib.outputs.ActionsCoreLib_type }}
    steps:
      - uses: actions/checkout@v4
      - id: ActionsCoreLib
        uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: config

  # ── App / Library stages ────────────────────────────────────────────────────

  compile:
    name: Compile
    needs: config
    if: needs.config.outputs.compile_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: compile

  unit_test:
    name: Unit Test
    needs: [config, compile]
    if: |
      always() &&
      needs.config.outputs.unit_test_enabled == 'true' &&
      needs.compile.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: unit_test

  linter:
    name: Linter
    needs: [config, compile]
    if: |
      always() &&
      needs.config.outputs.linter_enabled == 'true' &&
      needs.compile.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: linter

  semgrep:
    name: Semgrep
    needs: [config, compile]
    if: |
      always() &&
      needs.config.outputs.semgrep_enabled == 'true' &&
      needs.compile.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: semgrep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarqube:
    name: SonarQube
    needs: [config, compile]
    if: |
      always() &&
      needs.config.outputs.sonarqube_enabled == 'true' &&
      needs.compile.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: sonarqube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  trivy:
    name: Trivy
    needs: [config, compile]
    if: |
      always() &&
      needs.config.outputs.trivy_enabled == 'true' &&
      needs.compile.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: trivy

  checkov:
    name: Checkov
    needs: config
    if: needs.config.outputs.checkov_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: checkov

  publish:
    name: Publish
    needs: [config, compile, unit_test, linter, semgrep, trivy]
    if: |
      always() &&
      needs.config.outputs.publish_enabled == 'true' &&
      needs.compile.result == 'success' &&
      needs.unit_test.result != 'failure' &&
      needs.linter.result != 'failure' &&
      needs.semgrep.result != 'failure' &&
      needs.trivy.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  pre_deploy:
    name: Pre Deploy
    needs: [config, publish]
    if: |
      always() &&
      needs.config.outputs.pre_deploy_enabled == 'true' &&
      needs.publish.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: pre_deploy

  generic:
    name: Generic
    needs: config
    if: needs.config.outputs.generic_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: generic

  # ── Terraform stages ────────────────────────────────────────────────────────

  plan:
    name: Plan
    needs: config
    if: needs.config.outputs.plan_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TERRAGRUNT_NON_INTERACTIVE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib/.github/actions/setup-terraform@main
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          session-name: GitHubActions-plan
          terraform-version: ${{ needs.config.outputs.tools_terraform || '1.7.5' }}
          terragrunt-version: ${{ needs.config.outputs.tools_terragrunt || '0.55.18' }}
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: plan

  checkov_tf:
    name: Checkov Terraform
    needs: [config, plan]
    if: |
      always() &&
      needs.config.outputs.checkov_tf_enabled == 'true' &&
      needs.plan.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: checkov_tf

  # ── Deploy (shared: app + terraform) ────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [config, pre_deploy, plan]
    # environment gate: uses deploy.environment from action.yaml (empty = no gate for app repos)
    environment: ${{ needs.config.outputs.deploy_environment }}
    if: |
      always() &&
      needs.config.outputs.deploy_enabled == 'true' &&
      needs.pre_deploy.result != 'failure' &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TERRAGRUNT_NON_INTERACTIVE: "true"
    steps:
      - uses: actions/checkout@v4
      # Solo para repos terraform — app repos no tienen AWS_ROLE_ARN ni necesitan OIDC aquí
      - name: Setup Terraform + AWS
        if: needs.config.outputs.plan_enabled == 'true'
        uses: dropstat-org/gha-actions-core-lib/.github/actions/setup-terraform@main
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          session-name: GitHubActions-deploy
          terraform-version: ${{ needs.config.outputs.tools_terraform || '1.7.5' }}
          terragrunt-version: ${{ needs.config.outputs.tools_terragrunt || '0.55.18' }}
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  post_deploy:
    name: Post Deploy
    needs: [config, deploy]
    if: |
      always() &&
      needs.config.outputs.post_deploy_enabled == 'true' &&
      needs.deploy.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: post_deploy

  release:
    name: Release
    needs: [config, deploy]
    if: |
      always() &&
      needs.config.outputs.release_enabled == 'true' &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dropstat-org/gha-actions-core-lib@main
        with:
          stage: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
